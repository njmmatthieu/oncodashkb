row:
    cat_format:
        columns: 
            - Gene
            - Gene_type
        to_subject: gene_status
        format_string: "{Gene}:{Gene_type}"
transformers:
    - translate:
        column: Gene
        to_object: gene
        via_relation: gene_status_affects_gene
        reverse_relation: gene_affected_by_gene_status
        translations_file: data/HGNC/hgnc_complete_set.txt
        translate_from: symbol
        translate_to: ensembl_gene_id
        on_unknown_value: skip
        sep: "\t"
    - split:
        column: Drugs
        separator: "[,]"
        match:
            - \+:
                to_object: treatment
                via_relation: variant_biomarker_for_treatment
    - split_translate:
        column: Drugs
        to_object: drug
        via_relation: variant_biomarker_for_treatment
        separator: "[,]"
        translations_file: ./data/OT/drug_molecule/part-00000-871f412e-aec4-4d33-a50d-feee532ddcd2-c000.snappy.parquet
        translate_from: name
        translate_to: id
    - map:
        column: Tier
        to_property: Tier
        for_object: variant_biomarker_for_treatment
metadata:
        - data_source: oncokb_placeholder_annotation
